<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal Esportivo - Copa do Mundo</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <h1>🌎 Portal Esportivo</h1>
        <p>As principais notícias da Copa do Mundo</p>
    </header>

    <main class="container">
        <article class="noticia">
            <h2 id="titulo"></h2>

            <div class="informacoes">
                <span id="data"></span>
            </div>

            <img src="https://images.unsplash.com/photo-1547347298-4074fc3086f0?w=1200"
                 alt="Futebol">

            <p id="texto1"></p>
            <p id="texto2"></p>
            <p id="texto3"></p>

            <button id="btn">Mostrar Destaque</button>

            <div id="destaque"></div>
        </article>
    </main>

    <footer>
        <p>&copy; 2026 Portal Esportivo - Todos os direitos reservados.</p>
    </footer>

    <script src="script.js"></script>

</body>
</html>
